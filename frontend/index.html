<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Portal - Secure Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; color: #1a73e8; }
        input, select, button { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        .audit-note { font-size: 0.8rem; color: #666; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Patient Portal</h2>
    <input type="text" id="username" placeholder="Username">
    <select id="role">
        <option value="patient">Patient</option>
        <option value="nurse">Nurse</option>
        <option value="admin">Administrator</option>
    </select>
    <button onclick="mockLogin()">Secure Login</button>
    <p class="audit-note">All access attempts are logged for HIPAA compliance.</p>
</div>

<script>
    async function mockLogin() {
        const username = document.getElementById('username').value.trim();
        const role = document.getElementById('role').value;

        if (!username) {
            alert("Please enter a username.");
            return;
        }

        console.log(`[DEBUG] Attempting login for user: ${username} as ${role}`);

        try {
            const response = await fetch('http://192.168.1.164:8000/patients', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                },
                mode: 'cors'
            });

            console.log(`[DEBUG] Response status: ${response.status} ${response.statusText}`);

            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }

            const patients = await response.json();

            console.log(`[AUDIT LOG] User ${username} logged in as ${role}`);
            alert(`✅ Success!\nWelcome, ${username}!\nYou are logged in as ${role}.\n\nLoaded ${patients.length} patient records.`);

        } catch (error) {
            console.error("[ERROR] Fetch failed:", error);
            alert("Error connecting to backend: " + error.message + "\n\nCheck the browser console for details.");
        }
    }
</script>    
 

</body>
</html>
